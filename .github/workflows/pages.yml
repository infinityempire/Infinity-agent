name: Deploy Pages PWA bundle

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        env:
          VITE_HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: npm run build

      - name: Copy 404.html to dist for SPA routing
        run: cp public/404.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Enable GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -X PUT "repos/${{ github.repository }}/pages" -f build_type=workflow >/dev/null || true
          gh api -X PUT "repos/${{ github.repository }}/pages/site" -H "Accept: application/vnd.github+json" >/dev/null || true

      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
